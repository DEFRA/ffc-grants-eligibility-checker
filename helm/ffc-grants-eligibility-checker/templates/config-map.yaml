{{- include "ffc-helm-library.container-config-map" (list . "ffc-grants-eligibility-checker.config-map") -}}
{{- define "ffc-grants-eligibility-checker.config-map" -}}
data:
  NODE_ENV: {{ quote .Values.environment }}
  PORT: {{ quote .Values.container.port }}  
  CHECKER_SUBMITTED_ENDPOINT: {{ quote .Values.container.checkerSubmittedEndpoint }}
  NOTIFY_EMAIL_TEMPLATE: {{ quote .Values.container.notifyEmailTemplate | quote }}
  NOTIFY_EMAIL_ADDRESS: {{ quote .Values.container.notifyEmailAddress | quote }}
{{- end -}}
